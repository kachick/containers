# https://taskfile.dev

version: '3'

tasks:
  default:
    deps:
      - task: fmt
      - task: lint
      - task: test
  check:
    deps:
      - task: test
      - task: lint
  test:
    cmds:
      - echo 'Update here'
  fmt:
    cmds:
      - dprint fmt
      - git ls-files '*.nix' | xargs nix fmt
      - shfmt --write ./images/*/*.bash
      - cargo fmt --manifest-path cntr/Cargo.toml
  lint:
    cmds:
      - dprint check
      - typos . .github .vscode
      - git ls-files '*.nix' | xargs nixfmt --check
      - trivy config --exit-code 1 .
      - shellcheck ./images/*/*.bash
      - git ls-files | xargs nix run github:kachick/selfup/v1.3.1 -- list -check --
      - cargo clippy --manifest-path cntr/Cargo.toml -- -D warnings
  cntr:
    cmds:
      - cargo run --manifest-path cntr/Cargo.toml -- {{.CLI_ARGS}}
  'systemd:try':
    cmds:
      - task: cntr
        vars: { CLI_ARGS: 'build' }
  'systemd:ghcr':
    cmds:
      - task: cntr
        vars: { CLI_ARGS: "pull {{.TAG | default \"latest\"}}" }
  selfup:
    cmds:
      - git ls-files | xargs nix run github:kachick/selfup/v1.3.1 -- run --
