name: Containers
on:
  push:
    tags:
      - 'v*'
    branches: [main]
    paths:
      - '**Containerfile'
      - '.containerignore'
      - '.github/workflows/containers.yml'
  pull_request:
    paths:
      - '**Containerfile'
      - '.containerignore'
      - '.github/workflows/containers.yml'
  # Don't push same image with different digest even through scheduled triggers
  schedule:
    # Every 11:42 and 23:42 JST
    # https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#schedule
    - cron: '42 2,14 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  packages: write

jobs:
  # podman can handle lowercase. So normalize the outputs
  get-meta:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      started_at: ${{ steps.timestamp.outputs.started_at }}
      ref_tag: ${{ steps.tags.outputs.ref }}
      special_tag: ${{ steps.tags.outputs.special }}
      timestamp_tag: ${{ steps.tags.outputs.timestamp }}
      container_changed: ${{ steps.check-container-changed.outputs.changed }}
      workflow_changed: ${{ steps.check-workflow-changed.outputs.changed }}
    steps:
      - name: Get started timestamp
        id: timestamp
        run: |
          # Do not use ":" delimiter as iso-8601/rfc-3339, it cannot be used in container tag
          echo started_at="$(date --utc '+%Y%m%d-%H%M%S-%Z')" | ruby -pe '$_.downcase!' | tee -a "$GITHUB_OUTPUT"
      - name: Generate tags for the image
        id: tags
        # https://github.com/orgs/community/discussions/26557#discussioncomment-3252327
        run: |
          echo "timestamp=${{ steps.timestamp.outputs.started_at }}" | tee -a "$GITHUB_OUTPUT"

          special=''
          ref=''

          if [ '${{ github.event_name }}' = 'pull_request' ]; then
            special='pr-${{ github.event.number }}-${{ github.event.pull_request.head.sha }}'
            ref='${{ github.event.pull_request.head.sha }}'
          elif [ '${{ github.ref_name }}' = '${{ github.event.repository.default_branch }}' ]; then
            special='latest'
            ref='${{ github.sha }}'
          else
            exit 1
          fi

          echo "special=${special}" | tee -a "$GITHUB_OUTPUT"
          echo "ref=${ref}" | tee -a "$GITHUB_OUTPUT"
      - uses: actions/checkout@v6
      - name: Restore container content cache
        id: cache-container-content
        uses: actions/cache/restore@v4
        with:
          path: 'tmp/container-content-ok'
          key: content-${{ hashFiles('**/Containerfile', '.containerignore', 'images/**/*.bash') }}
      - name: Check container content change
        id: check-container-changed
        run: |
          if [ '${{ steps.cache-container-content.outputs.cache-hit }}' = 'true' ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore workflow logic cache
        id: cache-workflow-logic
        uses: actions/cache/restore@v4
        with:
          path: 'tmp/workflow-logic-ok'
          key: workflow-${{ hashFiles('.github/workflows/containers.yml') }}
      - name: Check workflow logic change
        id: check-workflow-changed
        run: |
          if [ '${{ steps.cache-workflow-logic.outputs.cache-hit }}' = 'true' ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
  ubuntu-nix-systemd:
    needs: [get-meta]
    if: (needs.get-meta.outputs.container_changed == 'true') || (needs.get-meta.outputs.workflow_changed == 'true') || (github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    outputs:
      package-json: ${{ steps.inspect-package.outputs.json }}
    steps:
      - name: Install Podman
        uses: redhat-actions/podman-install@0b0ebeccb256851665136971d7782ba7180773df # commit-0b0ebec
      - name: Logging dependency versions
        run: |
          podman version
          crun --version
          buildah version
      - uses: actions/checkout@v6
      - name: Build Image
        id: build-image
        uses: redhat-actions/buildah-build@7a95fa7ee0f02d552a32753e7414641a04307056 #v2.13
        with:
          image: ubuntu-24.04-nix-systemd
          tags: ${{ needs.get-meta.outputs.special_tag }} ${{ needs.get-meta.outputs.ref_tag }} ${{ needs.get-meta.outputs.timestamp_tag }}
          containerfiles: |
            ./images/ubuntu-nix-systemd/Containerfile
          oci: true
      # - name: Setup tmate session
      #   uses: mxschmitt/action-tmate@v3
      #   with:
      #     limit-access-to-actor: true
      - name: Inspect the created image
        run: |
          podman inspect localhost/${{ steps.build-image.outputs.image }}:${{ needs.get-meta.outputs.ref_tag }}
      - name: Push To ghcr.io
        id: push-to-ghcr
        if: ${{ github.actor == github.repository_owner }}
        run: |
          set -euxo pipefail

          image_name="${{ steps.build-image.outputs.image }}"
          tags="${{ steps.build-image.outputs.tags }}"
          registry="ghcr.io/${{ github.repository_owner }}"

          for tag in $tags; do
            # Buildah-build creates images in localhost/ by default
            source_image="localhost/${image_name}:${tag}"
            full_image_name="${registry}/${image_name}:${tag}"
            podman tag "${source_image}" "${full_image_name}"
            # Using --creds to avoid podman login
            # --digestfile is used to capture the digest for the next step
            podman push --creds="${{ github.repository_owner }}:${{ github.token }}" --digestfile=digest.txt "${full_image_name}"
          done

          # Capture the digest of the last pushed tag (they should all have the same digest since they are the same image)
          echo "digest=$(cat digest.txt)" >> "$GITHUB_OUTPUT"
      - name: Save container build caches
        if: steps.push-to-ghcr.outcome == 'success'
        run: |
          mkdir -p tmp
          touch tmp/container-content-ok
          touch tmp/workflow-logic-ok
      - name: Save container content cache
        if: steps.push-to-ghcr.outcome == 'success'
        uses: actions/cache/save@v4
        with:
          path: 'tmp/container-content-ok'
          key: content-${{ hashFiles('**/Containerfile', '.containerignore', 'images/**/*.bash') }}
      - name: Save workflow logic cache
        if: steps.push-to-ghcr.outcome == 'success'
        uses: actions/cache/save@v4
        with:
          path: 'tmp/workflow-logic-ok'
          key: workflow-${{ hashFiles('.github/workflows/containers.yml') }}
      - name: Log outputs
        if: ${{ github.event_name != 'pull_request' }}
        run: echo "${{ toJSON(steps.push-to-ghcr.outputs) }}"
      - name: Inspect the package
        id: inspect-package
        if: ${{ github.actor == github.repository_owner }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: | #shell
          #
          set -euxo pipefail

          echo "${{ toJSON(steps.push-to-ghcr.outputs) }}"

          {
            echo 'json<<JSON'

            gh api --paginate \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /users/${{ github.repository_owner }}/packages/container/ubuntu-24.04-nix-systemd/versions \
            --jq '.[] | select(.name == "${{ steps.push-to-ghcr.outputs.digest }}")' | \
              jq

            echo 'JSON'
          } | tee --append "$GITHUB_OUTPUT"

  announce-staging:
    needs: [get-meta, ubuntu-nix-systemd]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Prepare git to run gh commands
        uses: actions/checkout@v6
      - name: Post comments
        if: ${{ (github.actor == github.repository_owner) && (github.event_name == 'pull_request') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          (
          cat <<'EOF'
          ⬢🦭 Staging container-image has been deployed 🚀

          You can test the interactive shell 🐚 as follows.

          ```bash
          nix run github:${{ github.repository }}/${{ github.event.pull_request.head.sha }}#systemd-container-shell -- pull ${{ github.event.pull_request.head.sha }}
          ```

          [Package detail](https://github.com/${{ github.repository }}/pkgs/container/ubuntu-24.04-nix-systemd/${{ fromJson(needs.ubuntu-nix-systemd.outputs.package-json).id }}?tag=${{ needs.get-meta.outputs.special_tag }})

          This image will be automatically 🤖 removed from ghcr.io 🗑️ if you merged/closed this PR 😌
          EOF
          ) | gh pr comment ${{ github.event.number }} --body-file -
