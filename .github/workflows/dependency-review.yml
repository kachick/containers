name: 'Dependency Review'
on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - '**.nix'

permissions:
  contents: read

jobs:
  dependency-review:
    timeout-minutes: 15
    runs-on: ubuntu-26.04
    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v7
      - name: 'Dependency Review'
        uses: actions/dependency-review-action@v5
